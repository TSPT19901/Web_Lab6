<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="globals.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=SN+Pro:ital,wght@0,200..900;1,200..900&family=Winky+Sans:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <title>Thon Sopheaktra</title>
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center p-4">
    <div class="card w-90 h-80 max-w-lg bg-base-100  shadow-xl">
       <div class="card-body">
        
            <h1 class="card-title text-primary text-2xl mb-4 bungee-regular">
                Login
            </h1>
        
        <div class="flex flex-col justify-center items-center  space-y-6">
            <!-- Username -->
            <div >
                <label class="bungee-regular" for="Username">Username</label>
                <div class="pt-2">
                    <input class="h-8 w-60 rounded px-4  border-2 border-gray-400 bg-gray-100" placeholder="Input Your Username" type="text" name="Username" required>
                </div>
            </div>
            <!-- Password -->
            <div>
                <label class="bungee-regular" for="Password">Password</label>
                <div>
                    <input class="h-8 w-60 rounded px-4 border-2 border-gray-400 bg-gray-100" placeholder="Input Your Password " type="password" name="Password" required>
                </div>
            </div>
        </div>
        <div class="flex justify-center items-center pt-6">
        <button class="bg-gray-300 w-60 h-6 rounded hover:bg-gray-400 transition-colors duration-150 btn btn-danger">
            Login
        </button>
        </div>
        
       </div>
    </div>
    <script>
        // Wait until page loads
        document.addEventListener("DOMContentLoaded", function () {

            const loginBtn = document.querySelector("button");
            const usernameInput = document.querySelector("input[name='Username']");

            loginBtn.addEventListener("click", function () {

                let username = usernameInput.value.trim();

                if (username === "") {
                    alert("Please enter username!");
                    return;
                }

                // Save username into cookie (expire in 1 day)
                document.cookie = "username=" + username + "; path=/; max-age=" + (60 * 60 * 24);

                // Redirect to register.html
                window.open("register.html", "_blank");
            });

        });
    </script>
</body>
</html>
